<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business Type Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f4f6fb;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: white;
      padding: 36px 24px 36px;
      text-align: center;
      position: relative;
    }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 10px; }
    header p { font-size: 14px; opacity: 0.7; line-height: 1.6; max-width: 480px; margin: 0 auto; }

    /* Language toggle */
    .lang-toggle {
      position: absolute; top: 18px; right: 20px;
      display: flex; gap: 0; border-radius: 20px; overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.3);
    }
    .lang-btn {
      padding: 5px 14px; font-size: 12px; font-weight: 700;
      background: transparent; color: rgba(255,255,255,0.55);
      border: none; cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .lang-btn.active { background: rgba(255,255,255,0.2); color: white; }
    .lang-btn:hover:not(.active) { color: rgba(255,255,255,0.85); }

    .type-badges {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-top: 20px;
    }
    .badge {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.85);
    }

    .container { max-width: 680px; margin: 0 auto; padding: 32px 16px 60px; }

    .question-card {
      background: white; border-radius: 14px;
      padding: 22px 24px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: box-shadow 0.2s;
    }
    .question-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
    .question-card .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .q-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: #f0f3ff; color: #4a6cf7;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin-top: 1px;
    }
    .q-text { font-size: 15px; line-height: 1.55; font-weight: 500; }

    .scale-row { display: flex; gap: 6px; justify-content: space-between; }
    .scale-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #aaa; margin-top: 6px; padding: 0 2px;
    }
    .scale-btn {
      flex: 1; height: 38px;
      border: 2px solid #e8ecf4; border-radius: 8px;
      background: white; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #aaa;
      transition: all 0.15s;
    }
    .scale-btn:hover { border-color: #4a6cf7; color: #4a6cf7; background: #f0f3ff; }
    .scale-btn.selected { background: #4a6cf7; border-color: #4a6cf7; color: white; }
    .question-card.unanswered { border: 2px solid #ff6b6b; }

    .submit-wrap { text-align: center; margin-top: 36px; }
    .submit-btn {
      background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
      color: white; border: none; padding: 16px 48px;
      border-radius: 50px; font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(74,108,247,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(74,108,247,0.45); }

    /* RESULT */
    #result-section { display: none; }
    .result-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      color: white; border-radius: 18px;
      padding: 36px 28px; text-align: center; margin-bottom: 24px;
    }
    .result-hero .tag {
      display: inline-block; background: rgba(255,255,255,0.15);
      border-radius: 20px; padding: 5px 16px; font-size: 12px;
      font-weight: 600; letter-spacing: 1px; margin-bottom: 14px;
    }
    .result-hero h2 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .result-hero .subtitle { font-size: 15px; opacity: 0.75; line-height: 1.5; }

    .scores-card {
      background: white; border-radius: 14px;
      padding: 24px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .scores-card h3 { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; }
    .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .score-label { width: 90px; font-size: 13px; font-weight: 600; color: #333; }
    .score-bar-bg { flex: 1; height: 10px; background: #f0f3ff; border-radius: 10px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .score-val { width: 36px; text-align: right; font-size: 13px; font-weight: 700; color: #4a6cf7; }

    .reason-card {
      background: white; border-radius: 14px;
      padding: 24px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .reason-card h3 { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
    .reason-card p { font-size: 14px; line-height: 1.75; color: #444; }

    .ai-card { border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; }
    .ai-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .ai-card p { font-size: 14px; line-height: 1.75; }
    .ai-safe { background: #eefbf3; border-left: 4px solid #34c774; }
    .ai-safe h3 { color: #1a9950; }
    .ai-safe p { color: #2d6a4f; }
    .ai-risk { background: #fff4f4; border-left: 4px solid #ff6b6b; }
    .ai-risk h3 { color: #cc3333; }
    .ai-risk p { color: #7a3030; }
    .ai-mid { background: #fffbf0; border-left: 4px solid #f7c94a; }
    .ai-mid h3 { color: #b8860b; }
    .ai-mid p { color: #7a5c00; }

    .evolution-card {
      background: white; border-radius: 14px;
      padding: 24px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-top: 4px solid #f7a74a;
    }
    .evolution-card h3 { font-size: 13px; font-weight: 700; color: #c97a1a; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; }
    .practice-item {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid #f4f4f4;
    }
    .practice-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .practice-icon {
      min-width: 36px; height: 36px; border-radius: 10px;
      background: #fff8ed; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
    }
    .practice-body { flex: 1; }
    .practice-title { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .practice-desc { font-size: 13px; color: #666; line-height: 1.65; }

    .retry-btn {
      display: block; margin: 24px auto 0; background: white;
      border: 2px solid #4a6cf7; color: #4a6cf7;
      padding: 12px 36px; border-radius: 50px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .retry-btn:hover { background: #f0f3ff; }

    .color-visionary { background: linear-gradient(90deg, #f7c94a, #f7a74a); }
    .color-planner    { background: linear-gradient(90deg, #4a8cf7, #4acff7); }
    .color-connector  { background: linear-gradient(90deg, #f74a8c, #f74acf); }
    .color-doer       { background: linear-gradient(90deg, #4af77a, #4af7c9); }
    .color-evaluator  { background: linear-gradient(90deg, #a44af7, #f74acf); }
  </style>
</head>
<body>

<header>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
  </div>
  <h1 id="header-title">🧭 나는 어떤 비즈니스 유형인가?</h1>
  <p id="header-desc">AI 시대, 비즈니스 프로세스에서 당신이 가장 빛나는 역할을 찾아드립니다.</p>
  <div class="type-badges">
    <span class="badge">✨ Visionary</span>
    <span class="badge">📋 Planner</span>
    <span class="badge">🤝 Connector</span>
    <span class="badge">⚡ Doer</span>
    <span class="badge">🔍 Evaluator</span>
  </div>
</header>

<div class="container">
  <div id="survey-section">
    <div id="question-container"></div>
    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitSurvey()" id="submit-btn">결과 보기 →</button>
    </div>
  </div>

  <div id="result-section">
    <div class="result-hero">
      <div class="tag" id="result-tag">MY TYPE</div>
      <h2 id="result-type-name"></h2>
      <div class="subtitle" id="result-type-subtitle"></div>
    </div>

    <div class="scores-card">
      <h3 id="scores-title"></h3>
      <div id="score-bars"></div>
    </div>

    <div class="reason-card">
      <h3 id="reason-title"></h3>
      <p id="result-reason"></p>
    </div>

    <div class="ai-card" id="ai-outlook-card">
      <h3 id="ai-outlook-title"></h3>
      <p id="ai-outlook-text"></p>
    </div>

    <div class="evolution-card" id="evolution-card" style="display:none;">
      <h3 id="evolution-title"></h3>
      <div id="evolution-list"></div>
    </div>

    <button class="retry-btn" onclick="retakeSurvey()" id="retry-btn"></button>
  </div>
</div>

  // ─── Helpers ──────────────────────────────────────────────────
  const typeOrder  = ['visionary', 'planner', 'connector', 'doer', 'evaluator'];
  const typeColors = { visionary: 'color-visionary', planner: 'color-planner', connector: 'color-connector', doer: 'color-doer', evaluator: 'color-evaluator' };

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ─── Render questions ─────────────────────────────────────────
  function renderQuestions() {
    const shuffled = shuffle(questions[lang]);
    const t = ui[lang];
    const container = document.getElementById('question-container');
    container.innerHTML = shuffled.map((q, i) => `
      <div class="question-card" data-type="${q.type}">
        <div class="q-header">
          <div class="q-num">${i + 1}</div>
          <div class="q-text">${q.text}</div>
        </div>
        <div class="scale-row">
          <button class="scale-btn" data-val="1">1</button>
          <button class="scale-btn" data-val="2">2</button>
          <button class="scale-btn" data-val="3">3</button>
          <button class="scale-btn" data-val="4">4</button>
          <button class="scale-btn" data-val="5">5</button>
        </div>
        <div class="scale-labels"><span>${t.scaleMin}</span><span>${t.scaleMax}</span></div>
      </div>`).join('');
    bindScaleButtons();
  }

  function bindScaleButtons() {
    document.querySelectorAll('.scale-row').forEach(row => {
      row.querySelectorAll('.scale-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          btn.closest('.question-card').classList.remove('unanswered');
        });
      });
    });
  }

  // ─── Render result ────────────────────────────────────────────
  function renderResult(scores, topType) {
    const t  = ui[lang];
    const info = typeInfo[topType][lang];

    document.getElementById('result-tag').textContent         = t.resultTag;
    document.getElementById('result-type-name').textContent   = info.name;
    document.getElementById('result-type-subtitle').textContent = info.subtitle;
    document.getElementById('scores-title').textContent       = t.scoresTitle;
    document.getElementById('reason-title').textContent       = t.reasonTitle;
    document.getElementById('result-reason').textContent      = info.reason;
    document.getElementById('retry-btn').textContent          = t.retryBtn;
    document.getElementById('evolution-title').textContent    = t.evoTitle;

    // Score bars
    document.getElementById('score-bars').innerHTML = typeOrder.map(tp => {
      const pct = Math.round((scores[tp] / 15) * 100);
      return `<div class="score-row">
        <div class="score-label">${typeInfo[tp][lang].name.replace(/^[^\s]+\s/, '')}</div>
        <div class="score-bar-bg"><div class="score-bar-fill ${typeColors[tp]}" style="width:${pct}%"></div></div>
        <div class="score-val">${scores[tp]}/15</div>
      </div>`;
    }).join('');

    // AI outlook
    const aiCard = document.getElementById('ai-outlook-card');
    if (info.aiSafe === true) {
      aiCard.className = 'ai-card ai-safe';
      document.getElementById('ai-outlook-title').textContent = t.aiLabels.safe;
    } else if (info.aiSafe === false) {
      aiCard.className = 'ai-card ai-risk';
      document.getElementById('ai-outlook-title').textContent = t.aiLabels.risk;
    } else {
      aiCard.className = 'ai-card ai-mid';
      document.getElementById('ai-outlook-title').textContent = t.aiLabels.mid;
    }
    document.getElementById('ai-outlook-text').textContent = info.aiText;

    // Evolution
    const evoCard = document.getElementById('evolution-card');
    const evoList = document.getElementById('evolution-list');
    if (info.evolution) {
      evoList.innerHTML = info.evolution.map(p => `
        <div class="practice-item">
          <div class="practice-icon">${p.icon}</div>
          <div class="practice-body">
            <div class="practice-title">${p.title}</div>
            <div class="practice-desc">${p.desc}</div>
          </div>
        </div>`).join('');
      evoCard.style.display = 'block';
    } else {
      evoCard.style.display = 'none';
    }
  }

  // ─── Submit ───────────────────────────────────────────────────
  function submitSurvey() {
    const cards = document.querySelectorAll('.question-card');
    let allAnswered = true;
    cards.forEach(card => {
      if (!card.querySelector('.scale-btn.selected')) {
        card.classList.add('unanswered');
        allAnswered = false;
      }
    });
    if (!allAnswered) {
      document.querySelector('.question-card.unanswered').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const scores = { visionary: 0, planner: 0, connector: 0, doer: 0, evaluator: 0 };
    cards.forEach(card => {
      scores[card.dataset.type] += parseInt(card.querySelector('.scale-btn.selected').dataset.val);
    });

    let topType = typeOrder[0];
    typeOrder.forEach(t => { if (scores[t] > scores[topType]) topType = t; });

    lastScores  = scores;
    lastTopType = topType;

    renderResult(scores, topType);

    document.getElementById('survey-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── Retake ───────────────────────────────────────────────────
  function retakeSurvey() {
    lastScores  = null;
    lastTopType = null;
    renderQuestions();
    document.getElementById('survey-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── Language switch ──────────────────────────────────────────
  function setLang(l) {
    lang = l;
    document.getElementById('btn-ko').classList.toggle('active', l === 'ko');
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    document.documentElement.lang = l;

    const t = ui[l];
    document.getElementById('header-title').textContent = t.headerTitle;
    document.getElementById('header-desc').textContent  = t.headerDesc;
    document.getElementById('submit-btn').textContent   = t.submitBtn;

    const resultVisible = document.getElementById('result-section').style.display !== 'none';
    if (resultVisible && lastScores && lastTopType) {
      renderResult(lastScores, lastTopType);
    } else {
      renderQuestions();
    }
  }

  // ─── Init ─────────────────────────────────────────────────────
  renderQuestions();
</script>
